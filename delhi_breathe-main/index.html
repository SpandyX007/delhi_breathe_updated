<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroAnalytica Delhi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              card: "hsl(var(--card))",
              "card-foreground": "hsl(var(--card-foreground))",
              popover: "hsl(var(--popover))",
              "popover-foreground": "hsl(var(--popover-foreground))",
              primary: "hsl(var(--primary))",
              "primary-foreground": "hsl(var(--primary-foreground))",
              secondary: "hsl(var(--secondary))",
              "secondary-foreground": "hsl(var(--secondary-foreground))",
              muted: "hsl(var(--muted))",
              "muted-foreground": "hsl(var(--muted-foreground))",
              accent: "hsl(var(--accent))",
              "accent-foreground": "hsl(var(--accent-foreground))",
              destructive: "hsl(var(--destructive))",
              "destructive-foreground": "hsl(var(--destructive-foreground))",
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          },
        },
      }
    </script>
    <style>
      :root {
        --background: 220 26% 96%;
        --foreground: 220 20% 12%;
        --card: 0 0% 100%;
        --card-foreground: 220 20% 12%;
        --popover: 0 0% 100%;
        --popover-foreground: 220 20% 12%;
        --primary: 220 65% 18%;
        --primary-foreground: 0 0% 100%;
        --secondary: 220 15% 92%;
        --secondary-foreground: 220 20% 12%;
        --muted: 220 15% 92%;
        --muted-foreground: 220 12% 50%;
        --accent: 188 94% 42%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 84% 60%;
        --destructive-foreground: 0 0% 100%;
        --border: 220 15% 88%;
        --input: 220 15% 88%;
        --ring: 188 94% 42%;
        --radius: 0.75rem;
        --success: 142 76% 36%;
        --warning: 38 92% 50%;
        --info: 199 89% 48%;
      }
      .dark {
        --background: 222 47% 7%;
        --foreground: 210 40% 98%;
        --card: 222 40% 11%;
        --card-foreground: 210 40% 98%;
        --popover: 222 40% 11%;
        --popover-foreground: 210 40% 98%;
        --primary: 210 40% 98%;
        --primary-foreground: 222 47% 7%;
        --secondary: 222 35% 14%;
        --secondary-foreground: 210 40% 98%;
        --muted: 222 35% 14%;
        --muted-foreground: 220 15% 65%;
        --accent: 188 94% 42%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 72% 51%;
        --destructive-foreground: 210 40% 98%;
        --border: 222 35% 16%;
        --input: 222 35% 16%;
        --ring: 188 94% 42%;
        --success: 142 76% 36%;
        --warning: 38 92% 50%;
        --info: 199 89% 48%;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* Custom Scrollbar for "Trading Terminal" feel */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: hsl(var(--background));
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, hsl(var(--accent)) 0%, hsl(188 94% 30%) 100%);
        border-radius: 5px;
        border: 2px solid hsl(var(--background));
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, hsl(188 94% 50%) 0%, hsl(188 94% 35%) 100%);
      }
      /* Loading animation */
      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react-leaflet": "https://aistudiocdn.com/react-leaflet@^5.0.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.4.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-foreground antialiased overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
