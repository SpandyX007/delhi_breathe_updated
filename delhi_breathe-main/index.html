<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroAnalytica Delhi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              card: "hsl(var(--card))",
              "card-foreground": "hsl(var(--card-foreground))",
              popover: "hsl(var(--popover))",
              "popover-foreground": "hsl(var(--popover-foreground))",
              primary: "hsl(var(--primary))",
              "primary-foreground": "hsl(var(--primary-foreground))",
              secondary: "hsl(var(--secondary))",
              "secondary-foreground": "hsl(var(--secondary-foreground))",
              muted: "hsl(var(--muted))",
              "muted-foreground": "hsl(var(--muted-foreground))",
              accent: "hsl(var(--accent))",
              "accent-foreground": "hsl(var(--accent-foreground))",
              destructive: "hsl(var(--destructive))",
              "destructive-foreground": "hsl(var(--destructive-foreground))",
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          },
        },
      }
    </script>
    <style>
      :root {
        --background: 210 20% 98%;
        --foreground: 215 25% 15%;
        --card: 0 0% 100%;
        --card-foreground: 215 25% 15%;
        --popover: 0 0% 100%;
        --popover-foreground: 215 25% 15%;
        --primary: 215 28% 17%;
        --primary-foreground: 0 0% 98%;
        --secondary: 210 17% 95%;
        --secondary-foreground: 215 25% 17%;
        --muted: 210 17% 95%;
        --muted-foreground: 215 16% 47%;
        --accent: 175 60% 45%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 72% 51%;
        --destructive-foreground: 0 0% 100%;
        --border: 215 20% 88%;
        --input: 215 20% 88%;
        --ring: 175 60% 45%;
        --radius: 0.75rem;
        --success: 142 71% 45%;
        --warning: 38 92% 50%;
        --info: 199 89% 48%;
      }
      .dark {
        --background: 222 47% 11%;
        --foreground: 210 40% 98%;
        --card: 222 47% 14%;
        --card-foreground: 210 40% 98%;
        --popover: 222 47% 14%;
        --popover-foreground: 210 40% 98%;
        --primary: 210 40% 98%;
        --primary-foreground: 222 47% 11%;
        --secondary: 217 32% 17%;
        --secondary-foreground: 210 40% 98%;
        --muted: 217 32% 17%;
        --muted-foreground: 215 20% 65%;
        --accent: 175 60% 45%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 63% 31%;
        --destructive-foreground: 210 40% 98%;
        --border: 217 32% 17%;
        --input: 217 32% 17%;
        --ring: 175 60% 45%;
        --success: 142 71% 45%;
        --warning: 38 92% 50%;
        --info: 199 89% 48%;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar for "Trading Terminal" feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: hsl(var(--border));
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: hsl(var(--accent));
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react-leaflet": "https://aistudiocdn.com/react-leaflet@^5.0.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.4.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-foreground antialiased overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
